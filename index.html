<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>the-countdown</title>
    <script>
      // Set the theme before first paint to avoid a flash. Uses the stored
      // choice if present, else the OS preference. Keep the key in sync with
      // THEME_STORAGE_KEY in src/shared/constants.ts.
      ;(function () {
        try {
          var stored = localStorage.getItem('the-countdown:theme')
          var prefersDark = window.matchMedia(
            '(prefers-color-scheme: dark)',
          ).matches
          document.documentElement.dataset.theme =
            stored || (prefersDark ? 'dark' : 'light')
        } catch (e) {
          document.documentElement.dataset.theme = 'light'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
