name: Deploy

on:
  push:
    branches:
      - main

jobs:
  convex:
    name: Deploy Convex
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Deploy Convex
        run: npx convex deploy --cmd-url-env-var-name VITE_CONVEX_URL --cmd 'npm run build'
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
